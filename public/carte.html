<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carte Grossistes — MarchandPro 🇸🇳</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f4f6f4;overflow:hidden}
.header{background:linear-gradient(135deg,#004d26,#006633);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:1000}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.count{background:rgba(255,255,255,0.2);padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700}
.filters{position:fixed;top:54px;left:0;right:0;z-index:999;background:white;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;border-bottom:2px solid #e8f5e9;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f-btn{flex-shrink:0;background:#f4f6f4;border:2px solid transparent;color:#0d1f0d;padding:6px 13px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.f-btn.active{background:#e8f5e9;border-color:#006633;color:#006633}
#map{position:fixed;top:110px;left:0;right:0;bottom:72px;z-index:1}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid #e8f5e9;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:1000}
.bottom-title{font-weight:700;font-size:13px}
.btn-list{background:#006633;color:white;border:none;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.drawer{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;padding:16px;max-height:60vh;overflow-y:auto;z-index:1002;transform:translateY(100%);transition:transform 0.3s;box-shadow:0 -8px 32px rgba(0,0,0,0.15)}
.drawer.open{transform:translateY(0)}
.handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;cursor:pointer}
.drawer-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:14px}
.m-card{display:flex;align-items:center;gap:12px;padding:12px;background:#f4f6f4;border-radius:12px;margin-bottom:10px;text-decoration:none;color:inherit}
.m-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.m-nom{font-weight:700;font-size:13px;margin-bottom:2px}
.m-meta{font-size:11px;color:#5a7a5a}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:1001;display:none}
.overlay.show{display:block}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🗺️ Grossistes MarchandPro</div>
  <div class="count" id="cnt">…</div>
</div>

<div class="filters" id="filters">
  <button class="f-btn active" onclick="filtrer('tous',this)">🗺️ Tous</button>
</div>

<div id="map"></div>

<div class="bottom-bar">
  <div class="bottom-title" id="bottom-txt">📍 Chargement…</div>
  <button class="btn-list" onclick="openDrawer()">📋 Liste</button>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="handle" onclick="closeDrawer()"></div>
  <div class="drawer-title">📍 Tous les grossistes</div>
  <div id="drawer-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const COLORS = {
  alimentaire:'#006633',menagers:'#1565C0',poisson:'#00838F',pharmacie:'#AD1457',
  quincaillerie:'#E65100',telephonie:'#4527A0',textile:'#558B2F',cosmetiques:'#880E4F',
  cereales:'#5D4037',viande:'#B71C1C',emballage:'#37474F'
};
const EMOJIS = {
  alimentaire:'🌾',menagers:'🧴',poisson:'🐟',pharmacie:'💊',quincaillerie:'🔧',
  telephonie:'📱',textile:'👗',cosmetiques:'💄',cereales:'🌿',viande:'🥩',emballage:'📦'
};
const COORDS = {
  'dakar':[14.6937,-17.4441],'médina':[14.6919,-17.4478],'medina':[14.6919,-17.4478],
  'plateau':[14.6928,-17.4467],'hlm':[14.7089,-17.4567],'colobane':[14.6978,-17.4512],
  'mermoz':[14.7034,-17.4712],'pikine':[14.7456,-17.3923],'guédiawaye':[14.7789,-17.3867],
  'guediawaye':[14.7789,-17.3867],'rufisque':[14.7156,-17.2734],
  'parcelles assainies':[14.7789,-17.4234],'parcelles':[14.7789,-17.4234],
  'thiès':[14.7910,-16.9256],'thies':[14.7910,-16.9256],
  'touba':[14.8567,-15.8834],'kaolack':[14.1512,-16.0726],
};

const map = L.map('map').setView([14.72, -17.44], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [], MERCHANTS = [];

function makeIcon(couleur, emoji) {
  return L.divIcon({
    className: '',
    html: '<div style="width:36px;height:36px;border-radius:50%;background:' + couleur + ';display:flex;align-items:center;justify-content:center;font-size:16px;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3)">' + emoji + '</div>',
    iconSize: [36, 36],
    iconAnchor: [18, 18]
  });
}

async function charger() {
  try {
    const r = await fetch('/api/merchants-public');
    MERCHANTS = await r.json();

    const secteurs = [...new Set(MERCHANTS.map(m => m.secteur).filter(Boolean))];
    const fil = document.getElementById('filters');
    secteurs.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'f-btn';
      btn.textContent = (EMOJIS[s]||'🛒') + ' ' + s.charAt(0).toUpperCase() + s.slice(1);
      btn.onclick = function(){ filtrer(s, this); };
      fil.appendChild(btn);
    });

    const list = document.getElementById('drawer-list');
    list.innerHTML = '';

    MERCHANTS.forEach((m, i) => {
      const couleur = COLORS[m.secteur] || '#006633';
      const emoji = EMOJIS[m.secteur] || '🛒';
      const key = (m.ville||'dakar').toLowerCase().trim();
      const c = COORDS[key] || COORDS['dakar'];
      const lat = c[0] + Math.sin(i*1.5)*i*0.002;
      const lng = c[1] + Math.cos(i*1.5)*i*0.002;

      const marker = L.marker([lat, lng], { icon: makeIcon(couleur, emoji) }).addTo(map);
      marker.secteur = m.secteur || '';
      marker.bindPopup(
        '<div style="font-family:sans-serif;min-width:180px">' +
        '<div style="font-size:20px;margin-bottom:6px">' + emoji + '</div>' +
        '<div style="font-weight:800;font-size:14px;margin-bottom:4px">' + m.nom_boutique + '</div>' +
        '<div style="font-size:11px;color:#5a7a5a;margin-bottom:10px">📍 ' + (m.ville||'Dakar') + ' · ' + (m.secteur||'Général') + '</div>' +
        '<a href="/boutique/' + m.id + '" style="display:block;background:' + couleur + ';color:white;padding:8px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;text-align:center;margin-bottom:6px">Voir la boutique →</a>' +
        '<a href="https://wa.me/221711288439?text=' + encodeURIComponent('Bonjour ' + m.nom_boutique + ' !') + '" target="_blank" style="display:block;background:#25D366;color:white;padding:8px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px;text-align:center">📲 Commander</a>' +
        '</div>'
      );
      markers.push(marker);

      const card = document.createElement('a');
      card.href = '/boutique/' + m.id;
      card.className = 'm-card';
      card.dataset.secteur = m.secteur || '';
      card.innerHTML =
        '<div class="m-av" style="background:' + couleur + '22">' + emoji + '</div>' +
        '<div><div class="m-nom">' + m.nom_boutique + '</div>' +
        '<div class="m-meta">📍 ' + (m.ville||'Dakar') + ' · ' + emoji + ' ' + (m.secteur||'Général') + '</div></div>' +
        '<span style="margin-left:auto;color:#5a7a5a">→</span>';
      list.appendChild(card);
    });

    const n = MERCHANTS.length;
    document.getElementById('cnt').textContent = n + ' grossiste' + (n>1?'s':'');
    document.getElementById('bottom-txt').textContent = '📍 ' + n + ' grossiste' + (n>1?'s':'') + ' sur la carte';
  } catch(e) { console.error(e); }
}

function filtrer(secteur, btn) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let count = 0;
  markers.forEach(mk => {
    const visible = secteur === 'tous' || mk.secteur === secteur;
    visible ? mk.addTo(map) : map.removeLayer(mk);
    if (visible) count++;
  });
  document.querySelectorAll('.m-card').forEach(c => {
    c.style.display = (secteur === 'tous' || c.dataset.secteur === secteur) ? 'flex' : 'none';
  });
  document.getElementById('cnt').textContent = count + ' grossiste' + (count>1?'s':'');
  document.getElementById('bottom-txt').textContent = '📍 ' + count + ' grossiste' + (count>1?'s':'') + ' sur la carte';
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

charger();
</script>
</body>
</html>
